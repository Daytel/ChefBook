<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ChefBook - Сохранённые рецепты</title>
  <link rel="stylesheet" href="search.css">
</head>
<body>
  <div class="page">

    <div class="site-root" role="document" aria-label="Сохранённые рецепты — прототип">

      <!-- Шапка -->
      <header class="site__header" role="banner" aria-label="Шапка">
        <h1 class="site-title">
          <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <path fill="currentColor"
                  d="M12 2a3 3 0 0 0-3 3v1h6V5a3 3 0 0 0-3-3Zm5 6H7a1 1 0 0 0-1 1v11a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V9a1 1 0 0 0-1-1Zm-4 9h-2v-5h2v5Z"/>
          </svg>
          <span>ChefBook</span>
        </h1>

        <nav class="site__nav" role="navigation" aria-label="Главная навигация шапки">
          <button class="btn nav-item home" type="button">Главная</button>
          <button class="btn nav-item search" type="button">Поиск</button>
        </nav>

        <div class="site__actions">
          <button class="btn nav-item profile" type="button">Профиль</button>
        </div>
      </header>

      <!-- main -->
      <main class="site__main" role="main" aria-label="Сохранённые рецепты">
        <section class="saved-section">
          <h2 class="search-title">Сохранённые рецепты</h2>

          <div class="content-inner">

            <section class="right-column">
              <div class="results">
                <h3 class="panel-title">ВАШИ Сохранённые РЕЦЕПТЫ</h3>

                <div id="savedGrid" class="grid" role="list" aria-label="Сохранённые рецепты"></div>
              </div>
            </section>

          </div>
        </section>
      </main>

      <!-- Подвал -->
      <footer class="footer" role="contentinfo" aria-label="Нижняя навигация">
        <button class="btn home" type="button">Главная</button>
        <button class="btn profile" type="button">Профиль / Регистрация</button>
        <button class="btn only-about" type="button">О нас</button>
      </footer>
    </div>
  </div>

  <script>
    // Пример сохранённых рецептов (для отображения карточек)
    const savedRecipes = [
      { title: 'Паста с лососем', desc: 'Быстрое и сытное блюдо за 20 минут' },
      { title: 'Суп-пюре из тыквы', desc: 'Ароматный и согревающий суп для холодных вечеров' },
      { title: 'Шоколадный кекс', desc: 'Нежный десерт с насыщенным вкусом какао' },
      { title: 'Овсянка с ягодами', desc: 'Полезный и вкусный завтрак' }
    ];

    function escapeHtml(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderSaved(list) {
      const grid = document.getElementById('savedGrid');
      grid.innerHTML = '';

      list.forEach((r, i) => {
        const item = document.createElement('article');
        item.className = 'card';
        item.setAttribute('role', 'listitem');
        item.tabIndex = 0;
        item.innerHTML = `
          <div class="photo" aria-hidden="true"></div>
          <h4 class="title">${escapeHtml(r.title)}</h4>
          <p class="desc">${escapeHtml(r.desc)}</p>
          <div class="compose-row">
            <button class="btn compose-btn" data-i="${i}">Открыть</button>
          </div>
        `;
        grid.appendChild(item);
      });
    }

    // Переходы по кнопкам
    document.querySelectorAll('.home').forEach(btn => btn.addEventListener('click', () => {
      window.location.href = 'index.html';
    }));

    document.querySelectorAll('.profile').forEach(btn => btn.addEventListener('click', () => {
      window.location.href = 'profile.html';
    }));

    document.querySelectorAll('.search').forEach(btn => btn.addEventListener('click', () => {
      window.location.href = 'search.html';
    }));

    // Обработка нажатия "Открыть"
    document.addEventListener('click', e => {
      if (e.target.matches('.compose-btn')) {
        const title = e.target.closest('.card').querySelector('.title').textContent;
        alert('Открыт рецепт: ' + title);
      }
    });

    // Инициализация
    renderSaved(savedRecipes);
  </script>
</body>
</html>
