<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ChefBook - Планировщик меню</title>
  <link rel="stylesheet" href="planner.css">
</head>
<body>
  <div class="page">

    <div class="site-root" role="document" aria-label="Планировщик меню — прототип">

      <!-- Шапка (копия стиля search.html) -->
      <header class="site__header" role="banner" aria-label="Шапка">
        <h1 class="site-title">
          <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <path fill="currentColor"
                  d="M12 2a3 3 0 0 0-3 3v1h6V5a3 3 0 0 0-3-3Zm5 6H7a1 1 0 0 0-1 1v11a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V9a1 1 0 0 0-1-1Zm-4 9h-2v-5h2v5Z"/>
          </svg>
          <span>ChefBook</span>
        </h1>

        <nav class="site__nav" role="navigation" aria-label="Главная навигация шапки">
          <button class="btn nav-item home" type="button" aria-label="Перейти на главную">
            Главная
          </button>
        </nav>

        <div class="site__actions">
          <button class="btn nav-item profile" type="button" aria-label="Профиль / Регистрация">
            Профиль / Регистрация
          </button>
        </div>
      </header>

      <!-- main: планировщик -->
      <main class="site__main" role="main" aria-label="Контент — планировщик меню">
        <section class="planner-section" aria-labelledby="planner-title">
          <h2 id="planner-title" class="search-title">Планировщик меню</h2>

          <div class="content-inner">

            <!-- Левая колонка: сохранённые рецепты -->
            <aside class="left-column" aria-label="Сохранённые рецепты">
              <div class="panel-title" style="text-align:left; margin-bottom:8px;">СОХРАНЁННЫЕ РЕЦЕПТЫ</div>

              <div id="savedList" class="saved-list" role="list" aria-label="Список сохранённых рецептов"></div>

              <div style="margin-top:12px;">
                <button id="addSampleBtn" class="btn" type="button">Добавить примерный рецепт</button>
                <button id="clearAllSaved" class="btn" type="button">Очистить сохранённые</button>
              </div>
            </aside>

            <!-- Правая колонка: календарь и список ингредиентов -->
            <section class="right-column" aria-label="Календарь и список покупок">
              <div class="panel-title" style="text-align:center;">КАЛЕНДАРЬ (НЕДЕЛЯ)</div>

              <div id="calendar" class="calendar" role="list" aria-label="Календарь недели"></div>

              <div class="day-controls" style="display:flex; gap:8px; justify-content:flex-end; margin-top:8px;">
                <button id="clearDayBtn" class="btn" type="button">Очистить день</button>
                <button id="prevWeek" class="btn" type="button">← Пред. неделя</button>
                <button id="nextWeek" class="btn" type="button">След. неделя →</button>
              </div>

              <div class="panel-title" style="text-align:left; margin-top:14px;">СПИСОК ИНГРЕДИЕНТОВ ДНЯ</div>
              <div id="ingredientsBox" class="box" aria-live="polite">
                <div id="ingredientsList">Выберите день в календаре</div>
              </div>
            </section>

          </div>
        </section>
      </main>

      <!-- Подвал -->
      <footer class="footer" role="contentinfo" aria-label="Нижняя навигация">
        <button class="btn home" type="button" aria-label="Перейти на главную">Главная</button>
        <button class="btn profile" type="button" aria-label="Профиль / Регистрация">Профиль / Регистрация</button>
        <button class="btn only-about" type="button" aria-label="О нас">О нас</button>
      </footer>
    </div>
  </div>

  <script>
    // ---------- sample saved recipes (with ingredients) ----------
    const sampleSaved = [
      {
        id: 'r1',
        title: 'Простой салат с курицей',
        desc: 'Вкусный салат за 15 минут',
        ingredients: [
          { name: 'Курица (филе)', qty: 300, unit: 'г' },
          { name: 'Салат', qty: 150, unit: 'г' },
          { name: 'Помидоры', qty: 100, unit: 'г' },
          { name: 'Оливковое масло', qty: 2, unit: 'ст.л.' }
        ]
      },
      {
        id: 'r2',
        title: 'Шоколадный кекс',
        desc: 'Нежный десерт',
        ingredients: [
          { name: 'Мука', qty: 200, unit: 'г' },
          { name: 'Какао-порошок', qty: 30, unit: 'г' },
          { name: 'Яйца', qty: 2, unit: 'шт' },
          { name: 'Сахар', qty: 120, unit: 'г' }
        ]
      },
      {
        id: 'r3',
        title: 'Паста с лососем',
        desc: 'Быстро и сытно',
        ingredients: [
          { name: 'Паста', qty: 200, unit: 'г' },
          { name: 'Лосось', qty: 150, unit: 'г' },
          { name: 'Сливки', qty: 100, unit: 'мл' },
          { name: 'Пармезан', qty: 30, unit: 'г' }
        ]
      }
    ];

    // ---------- state ----------
    const STORAGE_KEYS = {
      SAVED: 'chefbook.savedRecipes',
      PLAN: 'chefbook.weekPlan',
      WEEK_START: 'chefbook.weekStart' // timestamp of monday
    };

    let saved = loadSaved();
    let weekPlan = loadPlan(); // { 'YYYY-MM-DD': [recipeIds...] }
    let selectedDay = null; // 'YYYY-MM-DD'
    let weekStart = loadWeekStart(); // Date object for current week start (Monday)

    // ---------- helpers ----------
    function formatDateKey(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${day}`;
    }

    function startOfWeek(date) {
      // monday as start
      const d = new Date(date);
      const day = d.getDay();
      const diff = (day === 0 ? -6 : 1) - day; // if sunday -> go back 6
      d.setDate(d.getDate() + diff);
      d.setHours(0,0,0,0);
      return d;
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEYS.SAVED, JSON.stringify(saved));
      localStorage.setItem(STORAGE_KEYS.PLAN, JSON.stringify(weekPlan));
      if (weekStart) localStorage.setItem(STORAGE_KEYS.WEEK_START, weekStart.getTime());
    }

    function loadSaved() {
      const raw = localStorage.getItem(STORAGE_KEYS.SAVED);
      if (raw) {
        try { return JSON.parse(raw); } catch(e) { /* ignore */ }
      }
      // default: sampleSaved
      localStorage.setItem(STORAGE_KEYS.SAVED, JSON.stringify(sampleSaved));
      return sampleSaved.slice();
    }

    function loadPlan() {
      const raw = localStorage.getItem(STORAGE_KEYS.PLAN);
      if (raw) {
        try { return JSON.parse(raw); } catch(e) { /* ignore */ }
      }
      return {};
    }

    function loadWeekStart() {
      const raw = localStorage.getItem(STORAGE_KEYS.WEEK_START);
      if (raw) {
        const t = Number(raw);
        if (!isNaN(t)) return new Date(t);
      }
      return startOfWeek(new Date());
    }

    // ---------- rendering ----------
    function renderSavedList() {
      const box = document.getElementById('savedList');
      box.innerHTML = '';
      if (!saved || saved.length === 0) {
        box.innerHTML = '<div class="box">Нет сохранённых рецептов</div>';
        return;
      }
      saved.forEach((r) => {
        const card = document.createElement('div');
        card.className = 'card saved-card';
        card.setAttribute('role', 'listitem');
        card.draggable = true;
        card.dataset.id = r.id;
        card.innerHTML = `
          <div class="photo" aria-hidden="true"></div>
          <h4 class="title">${escapeHtml(r.title)}</h4>
          <p class="desc">${escapeHtml(r.desc)}</p>
          <div class="compose-row">
            <button class="btn small add-btn" data-id="${r.id}" aria-label="Добавить ${escapeHtml(r.title)} в день">Добавить</button>
            <button class="btn small remove-saved" data-id="${r.id}" aria-label="Удалить ${escapeHtml(r.title)}">Удалить</button>
          </div>
        `;
        // drag
        card.addEventListener('dragstart', (ev) => {
          ev.dataTransfer.setData('text/plain', r.id);
          ev.dataTransfer.effectAllowed = 'copy';
        });
        box.appendChild(card);
      });
    }

    function renderCalendar() {
      const cal = document.getElementById('calendar');
      cal.innerHTML = '';
      const days = [];
      for (let i=0;i<7;i++) {
        const d = new Date(weekStart);
        d.setDate(d.getDate() + i);
        days.push(d);
      }

      days.forEach((d) => {
        const key = formatDateKey(d);
        const dayEl = document.createElement('div');
        dayEl.className = 'calendar-day';
        dayEl.dataset.key = key;
        dayEl.tabIndex = 0;
        dayEl.innerHTML = `
          <div class="day-head">
            <div class="day-name">${dayName(d)}</div>
            <div class="day-date">${d.getDate()}.${String(d.getMonth()+1).padStart(2,'0')}</div>
          </div>
          <div class="day-recipes" aria-label="Рецепты дня" role="list"></div>
        `;
        // drop handlers
        dayEl.addEventListener('dragover', (ev) => {
          ev.preventDefault();
          dayEl.classList.add('dragover');
        });
        dayEl.addEventListener('dragleave', () => dayEl.classList.remove('dragover'));
        dayEl.addEventListener('drop', (ev) => {
          ev.preventDefault();
          dayEl.classList.remove('dragover');
          const id = ev.dataTransfer.getData('text/plain');
          if (id) addRecipeToDay(key, id);
        });

        // click/select day
        dayEl.addEventListener('click', (ev) => {
          // if click on remove button, ignore selection
          if (ev.target.matches('.remove-day-recipe')) return;
          selectDay(key);
        });

        // render recipes in this day
        const listEl = dayEl.querySelector('.day-recipes');
        const ids = weekPlan[key] || [];
        if (ids.length === 0) {
          listEl.innerHTML = '<div class="muted">Пусто</div>';
        } else {
          listEl.innerHTML = '';
          ids.forEach((rid, idx) => {
            const r = saved.find(s => s.id === rid);
            const item = document.createElement('div');
            item.className = 'day-recipe';
            item.setAttribute('role','listitem');
            item.innerHTML = `
              <div class="day-recipe-title">${escapeHtml(r ? r.title : '(удален)')}</div>
              <button class="btn small remove-day-recipe" data-day="${key}" data-i="${idx}" aria-label="Удалить рецепт">✕</button>
            `;
            listEl.appendChild(item);
          });
        }

        // delegate remove buttons
        listEl.addEventListener('click', (ev) => {
          if (ev.target.matches('.remove-day-recipe')) {
            const day = ev.target.dataset.day;
            const i = Number(ev.target.dataset.i);
            removeRecipeFromDay(day, i);
          }
        });

        // highlight selected
        if (key === selectedDay) dayEl.classList.add('selected');
        cal.appendChild(dayEl);
      });

      // show ingredients for selected day
      renderIngredients();
    }

    function dayName(d) {
      const names = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
      return names[d.getDay()];
    }

    function renderIngredients() {
      const box = document.getElementById('ingredientsList');
      if (!selectedDay) {
        box.innerHTML = 'Выберите день в календаре';
        return;
      }
      const ids = weekPlan[selectedDay] || [];
      if (!ids || ids.length === 0) {
        box.innerHTML = '<div class="muted">В этот день нет рецептов</div>';
        return;
      }
      // aggregate ingredients
      const map = {}; // key -> {name, unit, qty}
      ids.forEach((rid) => {
        const r = saved.find(s => s.id === rid);
        if (!r || !r.ingredients) return;
        r.ingredients.forEach((ing) => {
          const key = `${ing.name}||${ing.unit}`;
          if (!map[key]) map[key] = { name: ing.name, unit: ing.unit, qty: 0 };
          map[key].qty += Number(ing.qty) || 0;
        });
      });

      const rows = Object.values(map).map(m => `<div class="ing-row"><div class="ing-name">${escapeHtml(m.name)}</div><div class="ing-qty">${m.qty} ${escapeHtml(m.unit)}</div></div>`);
      box.innerHTML = rows.join('') + `<div style="margin-top:8px; text-align:right;">
        <button id="exportList" class="btn">Скопировать список</button>
      </div>`;

      // copy handler
      document.getElementById('exportList').addEventListener('click', () => {
        const text = Object.values(map).map(m => `${m.name} — ${m.qty} ${m.unit}`).join('\n');
        navigator.clipboard && navigator.clipboard.writeText(text);
        alert('Список ингредиентов скопирован в буфер обмена');
      });
    }

    // ---------- actions ----------
    function addRecipeToDay(dayKey, recipeId) {
      if (!weekPlan[dayKey]) weekPlan[dayKey] = [];
      weekPlan[dayKey].push(recipeId);
      saveState();
      renderCalendar();
      selectDay(dayKey);
    }

    function removeRecipeFromDay(dayKey, index) {
      if (!weekPlan[dayKey]) return;
      weekPlan[dayKey].splice(index,1);
      if (weekPlan[dayKey].length === 0) delete weekPlan[dayKey];
      saveState();
      // if removed recipe was in selected day, re-render ingredients
      renderCalendar();
    }

    function selectDay(dayKey) {
      selectedDay = dayKey;
      // re-render to highlight
      renderCalendar();
      // scroll ingredients into view (if needed)
      document.getElementById('ingredientsBox').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // add via button in saved list (shortcut)
    document.addEventListener('click', (ev) => {
      if (ev.target.matches('.add-btn')) {
        const id = ev.target.dataset.id;
        if (!selectedDay) {
          // if no day selected, default to Monday
          const def = formatDateKey(weekStart);
          addRecipeToDay(def, id);
        } else {
          addRecipeToDay(selectedDay, id);
        }
      } else if (ev.target.matches('.remove-saved')) {
        const id = ev.target.dataset.id;
        if (!confirm('Удалить сохранённый рецепт?')) return;
        saved = saved.filter(s => s.id !== id);
        // also remove from plan
        for (const k of Object.keys(weekPlan)) {
          weekPlan[k] = weekPlan[k].filter(x => x !== id);
          if (weekPlan[k].length === 0) delete weekPlan[k];
        }
        saveState();
        renderSavedList();
        renderCalendar();
      } else if (ev.target.matches('.home')) {
        window.location.href = 'index.html';
      }
    });

    // clear day
    document.getElementById('clearDayBtn').addEventListener('click', () => {
      if (!selectedDay) return alert('Выберите день для очистки');
      if (!confirm('Очистить все рецепты в выбранном дне?')) return;
      delete weekPlan[selectedDay];
      saveState();
      renderCalendar();
    });

    // week navigation
    document.getElementById('prevWeek').addEventListener('click', () => {
      weekStart.setDate(weekStart.getDate() - 7);
      saveState();
      renderCalendar();
    });
    document.getElementById('nextWeek').addEventListener('click', () => {
      weekStart.setDate(weekStart.getDate() + 7);
      saveState();
      renderCalendar();
    });

    // add sample saved recipe
    document.getElementById('addSampleBtn').addEventListener('click', () => {
      const id = 'r' + Math.random().toString(36).slice(2,8);
      const newR = { id, title: 'Новый рецепт ' + id, desc: 'Добавлен вручную', ingredients: [{name:'Ингредиент A', qty:1, unit:'шт'}] };
      saved.push(newR);
      saveState();
      renderSavedList();
    });

    // clear saved
    document.getElementById('clearAllSaved').addEventListener('click', () => {
      if (!confirm('Удалить все сохранённые рецепты?')) return;
      saved = [];
      // clear plan too
      weekPlan = {};
      saveState();
      renderSavedList();
      renderCalendar();
    });

    // ---------- utils ----------
    function escapeHtml(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    // remove default drag ghost effect for desktop (accessibility nicety)
    document.addEventListener('dragstart', (e) => {
      // do nothing special
    });

    // remove recipe from day when pressing Delete while focused on a day-recipe
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Delete') {
        const el = document.activeElement;
        if (el && el.matches('.day-recipe')) {
          const parentDay = el.closest('.calendar-day');
          const day = parentDay && parentDay.dataset.key;
          const idx = Array.from(parentDay.querySelectorAll('.day-recipe')).indexOf(el);
          if (day && idx >= 0 && confirm('Удалить рецепт из дня?')) {
            removeRecipeFromDay(day, idx);
          }
        }
      }
    });

    // ---------- init ----------
    // ensure sample saved exists if none
    if (!saved || saved.length === 0) {
      saved = sampleSaved.slice();
    }

    // initial selected -> first day of week
    selectedDay = formatDateKey(weekStart);

    renderSavedList();
    renderCalendar();

  </script>

</body>
</html>
