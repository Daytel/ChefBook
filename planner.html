<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ChefBook - Планировщик меню</title>
    <link rel="stylesheet" href="planner.css" />
    <link rel="stylesheet" href="common.css" />
    <script src="planner.js" defer></script>
  </head>
  <body>
    <div class="page">
      <div
        class="site-root"
        role="document"
        aria-label="Планировщик меню — прототип"
      >
        <!-- Шапка -->
        <header class="site__header" role="banner" aria-label="Шапка">
          <div class="site-title">
            <img src="/icons/logo.svg" alt="" aria-hidden="true" />
            <span>ChefBook</span>
          </div>

          <nav
            class="site__nav"
            role="navigation"
            aria-label="Главная навигация шапки"
          >
            <button
              class="home-button btn"
              aria-label="Главная страница (кнопка)"
              data-href="index.html"
              type="button"
            >
              <img
                src="/icons/home.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ГЛАВНАЯ</span>
            </button>

            <button
              class="search-button btn"
              aria-label="Страница поиска (кнопка)"
              data-href="search.html"
              type="button"
            >
              <img
                src="/icons/search.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ПОИСК</span>
            </button>

            <button
              class="profile-button btn"
              role="button"
              aria-label="Профиль / Регистрация"
              data-href="profile.html"
              type="button"
            >
              <img
                src="/icons/profile.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ПРОФИЛЬ / РЕГИСТРАЦИЯ</span>
            </button>
          </nav>
        </header>

        <!-- main: планировщик -->
        <main
          class="site__main"
          role="main"
          aria-label="Контент — планировщик меню"
        >
          <div class="planner-div" aria-labelledby="planner-title">
            <h1 id="planner-title" class="search-title">
              Планировщик меню
            </h1>

            <div class="content-inner">
              <!-- Левая колонка: сохранённые рецепты -->
              <div class="left-column" aria-label="Сохранённые рецепты">
                <div
                  class="panel-title"
                  style="text-align: left; margin-bottom: 8px"
                >
                  <h2>СОХРАНЁННЫЕ РЕЦЕПТЫ</h2>
                </div>

                <div
                  id="savedList"
                  class="saved-list"
                  role="list"
                  aria-label="Список сохранённых рецептов"
                >
                  <h2>Нет сохранённых рецептов</h2>
                </div>

                <div style="margin-top: 12px">
                  <button id="clearAllSaved" class="btn" type="button">
                    <div>Очистить сохранённые</div>
                  </button>
                </div>
              </div>

              <!-- Правая колонка: календарь и список ингредиентов -->
              <div class="right-column" aria-label="Календарь и список покупок">
                <div class="panel-title" style="text-align: center">
                  <h2>КАЛЕНДАРЬ (НЕДЕЛЯ)</h2>
                </div>

                <div
                  id="calendar"
                  class="calendar"
                  role="list"
                  aria-label="Календарь недели"
                ></div>

                <div
                  class="day-controls"
                  style="
                    display: flex;
                    gap: 8px;
                    justify-content: flex-end;
                    margin-top: 8px;
                  "
                >
                  <button id="clearDayBtn" class="btn" type="button">
                    Очистить день
                  </button>
                  <button id="prevWeek" class="btn" type="button">
                    ← Пред. неделя
                  </button>
                  <button id="nextWeek" class="btn" type="button">
                    След. неделя →
                  </button>
                </div>

                <div
                  class="panel-title"
                  style="text-align: left; margin-top: 14px"
                >
                  <h2>СПИСОК ИНГРЕДИЕНТОВ ДНЯ</h2>
                </div>
                <div id="ingredientsBox" class="box" aria-live="polite">
                  <div id="ingredientsList">
                    <p>Выберите день в календаре</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>

        <!-- Подвал -->
        <footer
          class="site__footer"
          role="contentinfo"
          aria-label="Нижняя навигация"
        >
          <button
            class="nav-item btn home"
            type="button"
            data-href="index.html"
          >
            <img
              src="/icons/home.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Главная</span>
          </button>

          <button
            class="nav-item btn search"
            type="button"
            data-href="search.html"
          >
            <img
              src="/icons/search.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Поиск</span>
          </button>

          <button
            class="nav-item btn profile"
            type="button"
            data-href="profile.html"
          >
            <img
              src="/icons/profile.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Профиль / Регистрация</span>
          </button>

          <button
            class="nav-item btn only-about"
            type="button"
            data-href="about.html"
            aria-label="О нас"
          >
            <img
              src="/icons/info.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">О нас</span>
          </button>
        </footer>
      </div>
    </div>
  </body>
</html>
