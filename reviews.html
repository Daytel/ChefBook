<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ChefBook - Отзывы об авторе</title>
    <link rel="stylesheet" href="reviews.css" />
    <link rel="stylesheet" href="common.css" />
    <script src="reviews.js" defer></script>
  </head>
  <body>
    <div class="page">
      <div
        class="site-root"
        role="document"
        aria-label="Отзывы об авторе — прототип"
      >
        <!-- Шапка -->
        <header class="site__header" role="banner" aria-label="Шапка">
          <div class="site-title">
            <img src="/icons/logo.svg" alt="" aria-hidden="true" />
            <span>ChefBook</span>
          </div>

          <nav
            class="site__nav"
            role="navigation"
            aria-label="Главная навигация шапки"
          >
            <button
              class="home-button btn"
              aria-label="Главная страница (кнопка)"
              data-href="index.html"
              type="button"
            >
              <img
                src="/icons/home.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ГЛАВНАЯ</span>
            </button>

            <button
              class="search-button btn"
              aria-label="Страница поиска (кнопка)"
              data-href="search.html"
              type="button"
            >
              <img
                src="/icons/search.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ПОИСК</span>
            </button>

            <button
              class="profile-button btn"
              role="button"
              aria-label="Профиль / Регистрация"
              data-href="profile.html"
              type="button"
            >
              <img
                src="/icons/profile.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ПРОФИЛЬ / РЕГИСТРАЦИЯ</span>
            </button>
          </nav>
        </header>

        <!-- Содержимое -->
        <main class="site__main" role="main" aria-label="Отзывы автора">
          <div class="reviews-div" aria-labelledby="reviews-title">
            <h1 id="reviews-title" class="search-title">Отзывы об авторе</h1>

            <div class="content-inner reviews-inner">
              <div class="left-column reviews-column">
                <!-- Карточка автора -->
                <article
                  class="author-card box"
                  role="region"
                  aria-label="Карточка автора"
                  id="authorCard"
                >
                  <div class="author-row">
                    <div
                      class="author-avatar"
                      id="authorAvatar"
                      aria-hidden="true"
                    >
                      <img
                        src="https://images.unsplash.com/photo-1607746882042-944635dfe10e?w=200"
                        alt="Александра Иванова"
                        class="avatar-img"
                      />
                    </div>
                    <div class="author-info">
                      <h2 id="authorName">Александра Иванова</h2>
                      <div id="authorBio" class="muted">
                        Любит простые и быстрые рецепты для будних дней. Делится
                        лайфхаками по хранению продуктов.
                      </div>
                      <div class="author-meta">
                        <span id="authorRecipes">Рецептов: 12</span>
                        <span id="authorFollowers">Подписчиков: 134</span>
                      </div>
                    </div>
                  </div>

                  <div class="author-actions">
                    <button
                      id="followBtn"
                      class="btn"
                      type="button"
                      aria-pressed="false"
                    >
                      Подписаться
                    </button>
                  </div>
                </article>

                <!-- секция отзывов -->
                <h2 class="panel-title">ОТЗЫВЫ</h2>
                <section
                  class="box comments-box"
                  id="commentsBox"
                  aria-live="polite"
                  aria-label="Список отзывов"
                >
                  <form
                    id="commentForm"
                    class="comment-form"
                    aria-label="Добавить отзыв"
                  >
                    <label for="commentAuthor" class="visually-hidden"
                      >Имя</label
                    >
                    <input
                      id="commentAuthor"
                      class="input"
                      placeholder="Ваше имя"
                      aria-label="Ваше имя"
                    />

                    <label for="commentText" class="visually-hidden"
                      >Текст отзыва</label
                    >
                    <textarea
                      id="commentText"
                      class="input"
                      rows="3"
                      placeholder="Напишите отзыв об авторе"
                      aria-label="Текст отзыва"
                    ></textarea>

                    <div class="comment-form-row">
                      <div class="comment-buttons">
                        <button id="postComment" class="btn" type="button">
                          Опубликовать
                        </button>
                        <button id="resetComment" class="btn" type="button">
                          Очистить
                        </button>
                      </div>
                      <div class="muted comment-note">
                        Отзывы сохраняются локально (пример)
                      </div>
                    </div>
                  </form>

                  <hr
                    style="
                      margin: 12px 0;
                      border: none;
                      border-top: 1px solid var(--border);
                    "
                  />

                  <!-- Список комментариев -->
                  <div
                    id="commentsList"
                    class="comments-list"
                    role="list"
                    aria-label="Отзывы"
                  >
                    <!-- Добавление через JS -->
                  </div>
                </section>
              </div>
            </div>
          </div>
        </main>

        <!-- Подвал -->
        <footer
          class="site__footer"
          role="contentinfo"
          aria-label="Нижняя навигация"
        >
          <button
            class="nav-item btn home"
            type="button"
            data-href="index.html"
          >
            <img
              src="/icons/home.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Главная</span>
          </button>

          <button
            class="nav-item btn search"
            type="button"
            data-href="search.html"
          >
            <img
              src="/icons/search.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Поиск</span>
          </button>

          <button
            class="nav-item btn profile"
            type="button"
            data-href="profile.html"
          >
            <img
              src="/icons/profile.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Профиль / Регистрация</span>
          </button>

          <button
            class="nav-item btn only-about"
            type="button"
            data-href="about.html"
            aria-label="О нас"
          >
            <img
              src="/icons/info.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">О нас</span>
          </button>
        </footer>
      </div>
    </div>
  </body>
</html>
