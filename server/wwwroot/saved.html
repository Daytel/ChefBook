<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ChefBook - Сохранённые рецепты</title>
    <link rel="stylesheet" href="search.css" />
    <link rel="stylesheet" href="reviews.css" />
    <link rel="stylesheet" href="common.css" />
    <script src="saved.js" defer></script>
  </head>
  <body>
    <div class="page">
      <div
        class="site-root"
        role="document"
        aria-label="Сохранённые рецепты — прототип"
      >
        <!-- Шапка -->
        <header class="site__header" role="banner" aria-label="Шапка">
          <div class="site-title">
            <img src="/icons/logo.svg" alt="" aria-hidden="true" />
            <span>ChefBook</span>
          </div>

          <nav
            class="site__nav"
            role="navigation"
            aria-label="Главная навигация шапки"
          >
            <button
              class="home-button btn"
              aria-label="Главная страница (кнопка)"
              data-href="/index.html"
              type="button"
            >
              <img
                src="/icons/home.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ГЛАВНАЯ</span>
            </button>

            <button
              class="search-button btn"
              aria-label="Страница поиска (кнопка)"
              data-href="/Catalog"
              type="button"
            >
              <img
                src="/icons/search.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ПОИСК</span>
            </button>

            <button
              class="profile-button btn"
              role="button"
              aria-label="Профиль / Регистрация"
              data-href="/profile.html"
              type="button"
            >
              <img
                src="/icons/profile.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ПРОФИЛЬ / РЕГИСТРАЦИЯ</span>
            </button>
          </nav>
        </header>

        <!-- main -->
        <main class="site__main" role="main" aria-label="Сохранённые рецепты">
          <div class="saved-div">
            <h1 class="search-title">Сохранённые рецепты</h1>

            <div class="content-inner">
              <!-- Левая колонка: блок автора -->
              <div class="left-column">
                <div
                  class="author-card box"
                  role="region"
                  aria-label="Карточка пользователя"
                  id="authorCard"
                >
                  <div class="author-row">
                    <div
                      class="author-avatar"
                      id="authorAvatar"
                      aria-hidden="true"
                    >
                      <!-- вставляется <img> из saved.js -->
                    </div>
                    <div class="author-info">
                      <h2 id="authorName">Автор</h2>
                      <div id="authorBio" class="muted">
                        Информация об авторе
                      </div>
                      <div class="author-meta">
                        <span id="authorRecipes">Рецептов: 0</span>
                        <span id="authorFollowers">Подписчиков: 0</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Правая колонка: сетка сохранённых рецептов -->
              <div class="right-column">
                <div class="results">
                  <div
                    id="savedGrid"
                    class="grid"
                    role="list"
                    aria-label="Сохранённые рецепты"
                  ></div>
                </div>
              </div>
            </div>
          </div>
        </main>

        <!-- Подвал -->
        <footer
          class="site__footer"
          role="contentinfo"
          aria-label="Нижняя навигация"
        >
          <button
            class="nav-item btn home"
            type="button"
            data-href="/index.html"
          >
            <img
              src="/icons/home.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Главная</span>
          </button>

          <button
            class="nav-item btn search"
            type="button"
            data-href="/Catalog"
          >
            <img
              src="/icons/search.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Поиск</span>
          </button>

          <button
            class="nav-item btn profile"
            type="button"
            data-href="/profile.html"
          >
            <img
              src="/icons/profile.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Профиль / Регистрация</span>
          </button>

          <button
            class="nav-item btn only-about"
            type="button"
            data-href="/about.html"
            aria-label="О нас"
          >
            <img
              src="/icons/info.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">О нас</span>
          </button>
        </footer>
      </div>
    </div>
  </body>
</html>
