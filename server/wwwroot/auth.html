<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ChefBook — Вход / Регистрация</title>
    <link rel="stylesheet" href="common.css" />
    <link rel="stylesheet" href="auth.css" />
    <script src="common.js" defer></script>
    <script src="auth.js" defer></script>
  </head>
  <body>
    <div class="page">
      <div
        class="site-root"
        role="document"
        aria-label="Авторизация — ChefBook"
      >
        <header class="site__header" role="banner" aria-label="Шапка">
          <div class="site-title">
            <img src="/icons/logo.svg" alt="" aria-hidden="true" />
            <span>ChefBook</span>
          </div>
          <nav
            class="site__nav site__nav--left"
            role="navigation"
            aria-label="Основная навигация"
          >
            <button
              class="btn header-btn"
              type="button"
              data-href="/index.html"
              aria-label="Главная"
            >
              <img
                src="/icons/home.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ГЛАВНАЯ</span>
            </button>
            <button
              class="btn header-btn"
              type="button"
              data-href="/Catalog"
              aria-label="Поиск"
            >
              <img
                src="/icons/search.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ПОИСК</span>
            </button>
          </nav>
          <nav class="site__nav site__nav--right" aria-label="Аккаунт">
            <button
              class="btn header-btn nav-auth-btn"
              type="button"
              data-href="/auth.html"
              aria-label="Войти в аккаунт"
            >
              <img
                src="/icons/profile.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ВОЙТИ</span>
            </button>
          </nav>
        </header>

        <main class="site__main" role="main" aria-label="Авторизация">
          <div class="auth-div" aria-labelledby="auth-title">
            <h1 id="auth-title" class="auth-title">Вход / Регистрация</h1>

            <!-- Единая карточка: вкладки + форма внутри -->
            <div class="auth-card">
              <!-- Вкладки — часть карточки -->
              <div class="auth-tabs" role="tablist">
                <button
                  id="tabLogin"
                  class="auth-tab"
                  role="tab"
                  aria-selected="true"
                  aria-controls="loginSection"
                >
                  Вход
                </button>
                <button
                  id="tabRegister"
                  class="auth-tab"
                  role="tab"
                  aria-selected="false"
                  aria-controls="registerSection"
                >
                  Регистрация
                </button>
              </div>

              <!-- Форма входа -->
              <section
                id="loginSection"
                class="auth-form"
                role="tabpanel"
                aria-labelledby="tabLogin"
              >
                <div class="auth-field">
                  <label for="login" class="auth-label"
                    >Электронная почта</label
                  >
                  <input
                    id="login"
                    name="login"
                    class="auth-input"
                    type="email"
                    autocomplete="username"
                    placeholder="example@domain.com"
                  />
                </div>
                <div class="auth-field">
                  <label for="password" class="auth-label">Пароль</label>
                  <input
                    id="password"
                    name="password"
                    class="auth-input"
                    type="password"
                    autocomplete="current-password"
                    placeholder="Минимум 8 символов"
                  />
                </div>
                <p
                  id="authMsg"
                  class="auth-msg"
                  role="status"
                  aria-live="polite"
                ></p>
                <button id="loginBtn" class="auth-btn" type="button">
                  Войти
                </button>
              </section>

              <!-- Форма регистрации -->
              <section
                id="registerSection"
                class="auth-form"
                role="tabpanel"
                aria-labelledby="tabRegister"
                hidden
              >
                <div class="auth-field">
                  <label for="regEmail" class="auth-label"
                    >Электронная почта</label
                  >
                  <input
                    id="regEmail"
                    name="regEmail"
                    class="auth-input"
                    type="email"
                    autocomplete="email"
                    placeholder="example@domain.com"
                  />
                </div>
                <div class="auth-field">
                  <label for="regPassword" class="auth-label">Пароль</label>
                  <input
                    id="regPassword"
                    name="regPassword"
                    class="auth-input"
                    type="password"
                    autocomplete="new-password"
                    placeholder="Минимум 8 символов"
                  />
                </div>
                <p
                  id="authMsgReg"
                  class="auth-msg"
                  role="status"
                  aria-live="polite"
                ></p>
                <button id="registerBtn" class="auth-btn" type="button">
                  Создать аккаунт
                </button>
              </section>
            </div>
          </div>
        </main>

        <footer
          class="site__footer"
          role="contentinfo"
          aria-label="Нижняя навигация"
        >
          <button
            class="nav-item btn footer-home"
            type="button"
            data-href="/index.html"
          >
            <img
              src="/icons/home.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Главная</span>
          </button>
          <button
            class="nav-item btn footer-search"
            type="button"
            data-href="/Catalog"
          >
            <img
              src="/icons/search.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Поиск</span>
          </button>
          <button
            class="nav-item btn footer-auth nav-auth-btn"
            type="button"
            data-href="/auth.html"
          >
            <img
              src="/icons/profile.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Войти</span>
          </button>
          <button
            class="nav-item btn footer-about"
            type="button"
            data-href="/about.html"
          >
            <img
              src="/icons/info.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">О нас</span>
          </button>
        </footer>
      </div>
    </div>
  </body>
</html>
