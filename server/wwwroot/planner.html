<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ChefBook - Планировщик меню</title>
    <link rel="stylesheet" href="planner.css" />
    <link rel="stylesheet" href="common.css" />
    <script src="common.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="planner.js" defer></script>
  </head>
  <body>
    <div class="page">
      <div
        class="site-root"
        role="document"
        aria-label="Планировщик меню — прототип"
      >
        <!-- Шапка -->
        <header class="site__header" role="banner" aria-label="Шапка">
          <div class="site-title">
            <img src="/icons/logo.svg" alt="" aria-hidden="true" />
            <span>ChefBook</span>
          </div>
          <nav
            class="site__nav site__nav--left"
            role="navigation"
            aria-label="Основная навигация"
          >
            <button
              class="btn header-btn"
              type="button"
              data-href="/index.html"
              aria-label="Главная"
            >
              <img
                src="/icons/home.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ГЛАВНАЯ</span>
            </button>
            <button
              class="btn header-btn"
              type="button"
              data-href="/Catalog"
              aria-label="Поиск"
            >
              <img
                src="/icons/search.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ПОИСК</span>
            </button>
          </nav>
          <nav class="site__nav site__nav--right" aria-label="Аккаунт">
            <button
              class="btn header-btn nav-auth-btn"
              type="button"
              data-href="/auth.html"
              aria-label="Войти в аккаунт"
            >
              <img
                src="/icons/profile.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ВОЙТИ</span>
            </button>
          </nav>
        </header>

        <!-- main: планировщик -->
        <main
          class="site__main"
          role="main"
          aria-label="Контент — планировщик меню"
        >
          <div class="planner-div" aria-labelledby="planner-title">
            <h1 id="planner-title" class="search-title">Планировщик меню</h1>

            <div class="content-inner">
              <!-- Левая колонка: сохранённые рецепты -->
              <div class="left-column" aria-label="Сохранённые рецепты">
                <div
                  class="author-card box"
                  role="region"
                  aria-label="Карточка пользователя"
                  id="authorCard"
                >
                  <div class="author-row">
                    <div
                      class="author-avatar"
                      id="authorAvatar"
                      aria-hidden="true"
                    >
                      <!-- вставляется <img> из saved.js -->
                    </div>
                    <div class="author-info">
                      <p id="authorName" class="author-name-text">Автор</p>
                      <div id="authorBio" class="muted">
                        Информация об авторе
                      </div>
                      <div class="author-meta">
                        <span id="authorRecipes">Рецептов: 0</span>
                        <span id="authorFollowers">Подписчиков: 0</span>
                      </div>
                    </div>
                  </div>
                </div>
                <div
                  class="panel-title"
                  style="text-align: left; margin-bottom: 8px"
                >
                  <h2>СОХРАНЁННЫЕ РЕЦЕПТЫ</h2>
                </div>

                <div
                  id="savedList"
                  class="saved-list"
                  role="list"
                  aria-label="Список сохранённых рецептов"
                >
                  <h2>Нет сохранённых рецептов</h2>
                </div>

                <div style="margin-top: 12px">
                  <button id="clearAllSaved" class="btn" type="button">
                    <div>Очистить сохранённые</div>
                  </button>
                </div>
              </div>

              <!-- Правая колонка: календарь и список ингредиентов -->
              <div class="right-column" aria-label="Календарь и список покупок">
                <div class="panel-title" style="text-align: center">
                  <h2>КАЛЕНДАРЬ (НЕДЕЛЯ)</h2>
                </div>

                <div
                  id="calendar"
                  class="calendar"
                  role="list"
                  aria-label="Календарь недели"
                ></div>

                <div
                  class="day-controls"
                  style="
                    display: flex;
                    gap: 8px;
                    justify-content: flex-end;
                    margin-top: 8px;
                  "
                >
                  <button id="clearDayBtn" class="btn" type="button">
                    Очистить день
                  </button>
                  <button id="prevWeek" class="btn" type="button">
                    ← Пред. неделя
                  </button>
                  <button id="nextWeek" class="btn" type="button">
                    След. неделя →
                  </button>
                </div>

                <div
                  class="panel-title"
                  style="text-align: left; margin-top: 14px"
                >
                  <h2>СПИСОК ИНГРЕДИЕНТОВ ДНЯ</h2>
                </div>
                <div id="ingredientsBox" class="box" aria-live="polite">
                  <div id="ingredientsList">
                    <p>Выберите день в календаре</p>
                  </div>
                </div>

                <!-- Кнопка "Сохранить список покупок" -->
                <div style="margin-top: 12px; text-align: right">
                  <button id="saveShoppingListBtn" class="btn" type="button">
                    Сохранить список покупок (PDF)
                  </button>
                </div>
              </div>
            </div>
          </div>
        </main>

        <!-- Подвал -->
        <footer
          class="site__footer"
          role="contentinfo"
          aria-label="Нижняя навигация"
        >
          <button
            class="nav-item btn footer-home"
            type="button"
            data-href="/index.html"
          >
            <img
              src="/icons/home.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Главная</span>
          </button>
          <button
            class="nav-item btn footer-search"
            type="button"
            data-href="/Catalog"
          >
            <img
              src="/icons/search.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Поиск</span>
          </button>
          <button
            class="nav-item btn footer-auth nav-auth-btn"
            type="button"
            data-href="/auth.html"
          >
            <img
              src="/icons/profile.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Войти</span>
          </button>
          <button
            class="nav-item btn footer-about"
            type="button"
            data-href="/about.html"
          >
            <img
              src="/icons/info.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">О нас</span>
          </button>
        </footer>
      </div>
    </div>
  </body>
</html>
