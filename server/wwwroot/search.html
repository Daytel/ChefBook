<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ChefBook - Поиск рецептов</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="search.css" />
    <link rel="stylesheet" href="common.css" />
    <script src="common.js" defer></script>
    <script src="search.js" defer></script>
  </head>
  <body>
    <div class="page">
      <div
        class="site-root"
        role="document"
        aria-label="Страница Поиск рецептов — ChefBook"
      >
        <!-- Шапка -->
        <header class="site__header" role="banner" aria-label="Шапка">
          <div class="site-title">
            <img src="/icons/logo.svg" alt="" aria-hidden="true" />
            <span>ChefBook</span>
          </div>
          <nav
            class="site__nav site__nav--left"
            role="navigation"
            aria-label="Основная навигация"
          >
            <button
              class="btn header-btn"
              type="button"
              data-href="/index.html"
              aria-label="Главная"
            >
              <img
                src="/icons/home.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ГЛАВНАЯ</span>
            </button>
            <button
              class="btn header-btn"
              type="button"
              data-href="/Catalog"
              aria-label="Поиск"
            >
              <img
                src="/icons/search.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ПОИСК</span>
            </button>
          </nav>
          <nav class="site__nav site__nav--right" aria-label="Аккаунт">
            <button
              class="btn header-btn nav-auth-btn"
              type="button"
              data-href="/auth.html"
              aria-label="Войти в аккаунт"
            >
              <img
                src="/icons/profile.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ВОЙТИ</span>
            </button>
          </nav>
        </header>

        <main
          class="site__main"
          role="main"
          aria-label="Контент — поиск рецептов"
        >
          <div class="search-div" aria-labelledby="search-title">
            <h1 id="search-title" class="search-title">Поиск</h1>

            <div class="content-inner">
              <!-- Форма с фильтрами и категориями -->
              <div class="left-column" aria-label="Фильтры и категории">
                <form
                  class="search-area"
                  role="search"
                  aria-label="Форма поиска"
                >
                  <section>
                    <p id="filters-title" class="panel-title">ФИЛЬТРЫ</p>
                    <div class="search-row">
                      <label for="question" class="visually-hidden"
                        >Поиск по названию или ингредиенту</label
                      >
                      <input
                        id="question"
                        class="input"
                        name="question"
                        placeholder="Введите название или ингредиент"
                        autocomplete="off"
                      />
                      <button
                        id="searchBtn"
                        class="search-button btn"
                        type="submit"
                        aria-label="Начать поиск"
                      >
                        Начать поиск
                      </button>
                    </div>

                    <div class="filters" aria-hidden="false">
                      <div class="filter">
                        <label for="f-ing">Ингредиенты</label>
                        <select id="f-ing" name="ingredient">
                          <option value="">Любые</option>
                          <option value="Курица">Курица</option>
                          <option value="Овощи">Овощи</option>
                          <option value="Рыба">Рыба</option>
                          <option value="Овсянка">Овсянка</option>
                        </select>
                      </div>
                      <div class="filter">
                        <label for="f-time">Время приготовления</label>
                        <select id="f-time" name="time">
                          <option value="">Любое</option>
                          <option value="15">до 15 мин</option>
                          <option value="30">до 30 мин</option>
                        </select>
                      </div>
                      <div class="filter">
                        <label for="f-cal">Калории</label>
                        <select id="f-cal" name="cal">
                          <option value="">Любые</option>
                          <option value="100">&lt;100</option>
                          <option value="200">&lt;200</option>
                        </select>
                      </div>
                    </div>
                  </section>

                  <section class="categories-section">
                    <p id="categories-title" class="panel-title">КАТЕГОРИИ</p>
                    <fieldset
                      class="categories"
                      aria-labelledby="categories-title"
                    >
                      <div class="cols">
                        <div class="category-box">
                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Завтраки"
                            />
                            <span>Завтраки</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Супы"
                            />
                            <span>Супы</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Салаты"
                            />
                            <span>Салаты</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Выпечка"
                            />
                            <span>Выпечка</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Десерты"
                            />
                            <span>Десерты</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Вегетарианские"
                            />
                            <span>Вегетарианские</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Мясные"
                            />
                            <span>Мясные</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Напитки"
                            />
                            <span>Напитки</span>
                          </label>
                        </div>

                        <div class="category-box">
                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Паста"
                            />
                            <span>Паста</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Рыба"
                            />
                            <span>Рыба</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Постные"
                            />
                            <span>Постные</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Быстро"
                            />
                            <span>Быстро</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Детское"
                            />
                            <span>Детское</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="На мангале"
                            />
                            <span>На мангале</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Сезонные"
                            />
                            <span>Сезонные</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Праздничные"
                            />
                            <span>Праздничные</span>
                          </label>
                        </div>
                      </div>
                    </fieldset>
                  </section>
                </form>
              </div>

              <!-- правая колонка: результат -->
              <div class="right-column">
                <section class="results" aria-label="Найденные рецепты">
                  <p class="panel-title">НАЙДЕННЫЕ РЕЦЕПТЫ</p>
                  <ul id="resultsGrid" class="recipes-list" role="list"></ul>

                  <!-- Навигация по страницам результатов -->
                  <div
                    class="recipes-nav"
                    aria-label="Навигация рецептов"
                    role="navigation"
                  >
                    <button
                      id="navPrev"
                      class="btn nav-arrow"
                      type="button"
                      aria-label="Предыдущая страница"
                      aria-controls="resultsGrid"
                      disabled
                    >
                      <!-- Вставил компактную SVG-стрелку влево -->
                      <svg
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        aria-hidden="true"
                        focusable="false"
                      >
                        <path
                          d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"
                          fill="currentColor"
                        />
                      </svg>
                    </button>

                    <div
                      id="pageIndicator"
                      class="page-indicator"
                      aria-live="polite"
                      aria-atomic="true"
                    >
                      Страница 1
                    </div>

                    <button
                      id="navNext"
                      class="btn nav-arrow"
                      type="button"
                      aria-label="Следующая страница"
                      aria-controls="resultsGrid"
                      disabled
                    >
                      <!-- Вставил компактную SVG-стрелку вправо -->
                      <svg
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        aria-hidden="true"
                        focusable="false"
                      >
                        <path
                          d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"
                          fill="currentColor"
                        />
                      </svg>
                    </button>
                  </div>
                </section>

                <section class="history" aria-label="История поиска">
                  <p class="panel-title">ИСТОРИЯ ПОИСКА</p>
                  <div id="historyBox" class="box">
                    <div id="historyList">Пусто</div>
                  </div>
                </section>
              </div>
            </div>
          </div>
        </main>
        <footer
          class="site__footer"
          role="contentinfo"
          aria-label="Нижняя навигация"
        >
          <button
            class="nav-item btn footer-home"
            type="button"
            data-href="/index.html"
          >
            <img
              src="/icons/home.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Главная</span>
          </button>
          <button
            class="nav-item btn footer-search"
            type="button"
            data-href="/Catalog"
          >
            <img
              src="/icons/search.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Поиск</span>
          </button>
          <button
            class="nav-item btn footer-auth nav-auth-btn"
            type="button"
            data-href="/auth.html"
          >
            <img
              src="/icons/profile.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Войти</span>
          </button>
          <button
            class="nav-item btn footer-about"
            type="button"
            data-href="/about.html"
          >
            <img
              src="/icons/info.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">О нас</span>
          </button>
        </footer>
      </div>
    </div>
  </body>
</html>
