<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ChefBook - Отзывы об авторе</title>
    <link rel="stylesheet" href="reviews.css" />
    <link rel="stylesheet" href="common.css" />
    <script src="common.js" defer></script>
    <script src="reviews.js" defer></script>
  </head>
  <body>
    <div class="page">
      <div
        class="site-root"
        role="document"
        aria-label="Отзывы об авторе — прототип"
      >
        <!-- Шапка -->
        <header class="site__header" role="banner" aria-label="Шапка">
          <div class="site-title">
            <img src="/icons/logo.svg" alt="" aria-hidden="true" />
            <span>ChefBook</span>
          </div>
          <nav
            class="site__nav site__nav--left"
            role="navigation"
            aria-label="Основная навигация"
          >
            <button
              class="btn header-btn"
              type="button"
              data-href="/index.html"
              aria-label="Главная"
            >
              <img
                src="/icons/home.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ГЛАВНАЯ</span>
            </button>
            <button
              class="btn header-btn"
              type="button"
              data-href="/Catalog"
              aria-label="Поиск"
            >
              <img
                src="/icons/search.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ПОИСК</span>
            </button>
          </nav>
          <nav class="site__nav site__nav--right" aria-label="Аккаунт">
            <button
              class="btn header-btn nav-auth-btn"
              type="button"
              data-href="/auth.html"
              aria-label="Войти в аккаунт"
            >
              <img
                src="/icons/profile.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ВОЙТИ</span>
            </button>
          </nav>
        </header>

        <!-- Содержимое -->
        <main class="site__main" role="main" aria-label="Отзывы автора">
          <div class="reviews-div" aria-labelledby="reviews-title">
            <h1 id="reviews-title" class="search-title">Отзывы об авторе</h1>

            <div class="content-inner reviews-inner">
              <div class="left-column reviews-column">
                <!-- Карточка автора -->
                <article
                  class="author-card box"
                  role="region"
                  aria-label="Карточка автора"
                  id="authorCard"
                >
                  <div class="author-row">
                    <div
                      class="author-avatar"
                      id="authorAvatar"
                      aria-hidden="true"
                    >
                      <img
                        src="./images/avatar.jpg"
                        alt="Александра Иванова"
                        class="avatar-img"
                      />
                    </div>
                    <div class="author-info">
                      <p id="authorName" class="author-name-text">
                        Александра Иванова
                      </p>
                      <div id="authorBio" class="muted">
                        Любит простые и быстрые рецепты для будних дней. Делится
                        лайфхаками по хранению продуктов.
                      </div>
                      <div class="author-meta">
                        <span id="authorRecipes">Рецептов: 12</span>
                        <span id="authorFollowers">Подписчиков: 134</span>
                      </div>
                    </div>
                  </div>

                  <div class="author-actions" id="authorActions">
                    <button
                      id="followBtn"
                      class="btn"
                      type="button"
                      aria-pressed="false"
                    >
                      Подписаться
                    </button>
                  </div>
                </article>

                <!-- секция отзывов -->
                <h2 class="panel-title">ОТЗЫВЫ</h2>
                <section
                  class="box comments-box"
                  id="commentsBox"
                  aria-live="polite"
                  aria-label="Список отзывов"
                >
                  <!-- Форма отзыва. Имя берётся из localStorage (chefbook.user).
                       Без авторизации — кнопка заблокирована с подсказкой. -->
                  <form
                    id="commentForm"
                    class="comment-form"
                    aria-label="Добавить отзыв"
                  >
                    <label for="commentText" class="visually-hidden"
                      >Текст отзыва</label
                    >
                    <textarea
                      id="commentText"
                      class="input"
                      rows="3"
                      placeholder="Напишите отзыв об авторе"
                      aria-label="Текст отзыва"
                    ></textarea>

                    <div class="comment-form-row">
                      <div class="comment-buttons">
                        <button
                          id="postComment"
                          class="btn"
                          type="button"
                          disabled
                          title="Войдите в аккаунт, чтобы оставить отзыв"
                        >
                          Опубликовать
                        </button>
                        <button id="resetComment" class="btn" type="button">
                          Очистить
                        </button>
                      </div>
                    </div>
                    <!-- Сообщение для неавторизованных — управляется из reviews.js -->
                    <p
                      id="authHint"
                      class="muted comment-note"
                      style="margin-top: 6px; display: none"
                    >
                      Войдите в аккаунт, чтобы оставить отзыв.
                    </p>
                  </form>

                  <hr
                    style="
                      margin: 12px 0;
                      border: none;
                      border-top: 1px solid var(--border);
                    "
                  />

                  <!-- Список комментариев -->
                  <div
                    id="commentsList"
                    class="comments-list"
                    role="list"
                    aria-label="Отзывы"
                  >
                    <!-- Добавление через JS -->
                  </div>
                </section>
              </div>
            </div>
          </div>
        </main>

        <!-- Подвал -->
        <footer
          class="site__footer"
          role="contentinfo"
          aria-label="Нижняя навигация"
        >
          <button
            class="nav-item btn footer-home"
            type="button"
            data-href="/index.html"
          >
            <img
              src="/icons/home.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Главная</span>
          </button>
          <button
            class="nav-item btn footer-search"
            type="button"
            data-href="/Catalog"
          >
            <img
              src="/icons/search.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Поиск</span>
          </button>
          <button
            class="nav-item btn footer-auth nav-auth-btn"
            type="button"
            data-href="/auth.html"
          >
            <img
              src="/icons/profile.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Войти</span>
          </button>
          <button
            class="nav-item btn footer-about"
            type="button"
            data-href="/about.html"
          >
            <img
              src="/icons/info.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">О нас</span>
          </button>
        </footer>
      </div>
    </div>
  </body>
</html>
