<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ChefBook — Главная</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="common.css" />
    
  </head>
  <body>
    <div class="page">
      <div
        class="site-root"
        role="document"
        aria-label="Главная страница — ChefBook"
      >
        <!-- Шапка -->
        <header class="site__header" role="banner" aria-label="Шапка">
          <div class="site-title">
            <img src="/icons/logo.svg" alt="" aria-hidden="true" />
            <span>ChefBook</span>
          </div>

          <nav
            class="site__nav"
            role="navigation"
            aria-label="Главная навигация шапки"
          >
            <button
              class="search-button btn"
              aria-label="Поиск рецептов (кнопка)"
              data-href="/Catalog"
              type="button"
            >
              <img
                src="/icons/search.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ПОИСК</span>
            </button>

            <button
              class="profile btn"
              role="button"
              aria-label="Профиль / Регистрация"
              data-href="/profile.html"
              type="button"
            >
              <img
                src="/icons/profile.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ПРОФИЛЬ / РЕГИСТРАЦИЯ</span>
            </button>
          </nav>
        </header>

        <!-- Основной контент -->
        <main
          class="site__main"
          role="main"
          aria-label="Контент — список рецептов"
        >
          <div class="recipes-div" aria-labelledby="recipes-title">
            <h1 id="recipes-title" class="recipes-div__title">
              Список рецептов
            </h1>
            <ul class="recipes-list" role="list" aria-label="Список рецептов" id="recipesGrid">
            </ul>
          </div>
        </main>

        <!-- Подвал -->
        <footer
          class="site__footer"
          role="contentinfo"
          aria-label="Нижняя навигация"
        >
          <button
            class="nav-item btn home"
            type="button"
            data-href="/index.html"
          >
            <img
              src="/icons/home.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Главная</span>
          </button>

          <button
            class="nav-item btn profile"
            type="button"
            data-href="/profile.html"
          >
            <img
              src="/icons/profile.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Профиль / Регистрация</span>
          </button>

          <button
            class="nav-item btn only-about"
            type="button"
            data-href="/about.html"
            aria-label="О нас"
          >
            <img
              src="/icons/info.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">О нас</span>
          </button>
        </footer>
      </div>
    </div>


  <script>
  /* common.js — openIngredientsModal */
  window.openIngredientsModal = async function(id) {
    try {
      const res = await fetch("/api/recipes/" + id + "/ingredients");
      if (!res.ok) throw new Error("HTTP " + res.status);
      const d = await res.json();
      alert(d.recipeTitle + "\n\n" + d.ingredients.map(i => i.name + " — " + i.quantity + " " + i.unit).join("\n"));
    } catch(e) { alert("Ошибка: " + e.message); }
  };

  /* index.js */
  document.addEventListener("DOMContentLoaded", function() {

    document.querySelectorAll("[data-href]").forEach(function(el) {
      el.addEventListener("click", function() {
        var href = el.getAttribute("data-href");
        if (href) window.location.href = href;
      });
    });

    var grid = document.querySelector(".recipes-list");
    if (!grid) { console.error("НЕТ .recipes-list"); return; }

    grid.innerHTML = '<li style="padding:20px;color:#888">Загрузка...</li>';

    fetch("/api/recipes?page=1")
      .then(function(r) {
        console.log("API статус:", r.status);
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function(json) {
        console.log("API ответ:", JSON.stringify(json).substring(0, 300));
        var items = json.data || json.Data || [];
        console.log("Рецептов:", items.length);

        grid.innerHTML = "";
        if (!items.length) {
          grid.innerHTML = '<li style="padding:20px">Нет рецептов</li>';
          return;
        }

        items.forEach(function(r) {
          var li = document.createElement("li");
          li.className = "recipe-card";
          li.setAttribute("tabindex", "0");
          li.dataset.id = r.id || r.Id;
          var photo = r.mainPhoto || r.MainPhoto || "/images/placeholder.jpg";
          var title = r.title || r.Title || "";
          var desc  = r.description || r.Description || "";
          li.innerHTML =
            '<img class="recipe-photo" src="' + photo + '" alt="' + title + '">' +
            '<h2 class="recipe-title">' + title + '</h2>' +
            '<p class="recipe-desc">' + desc + '</p>' +
            '<div class="compose-row">' +
              '<button class="compose-btn btn" type="button">Состав</button>' +
            '</div>';
          grid.appendChild(li);
        });

        grid.addEventListener("click", function(e) {
          var btn = e.target.closest(".compose-btn");
          if (btn) {
            e.stopPropagation();
            var id = btn.closest(".recipe-card").dataset.id;
            window.openIngredientsModal(Number(id));
            return;
          }
          if (e.target.closest("button")) return;
          var card = e.target.closest(".recipe-card");
          if (card && card.dataset.id)
            window.location.href = "/recipe.html?id=" + card.dataset.id;
        });
      })
      .catch(function(err) {
        console.error("Ошибка:", err);
        grid.innerHTML = '<li style="padding:20px;color:red">Ошибка: ' + err.message + '</li>';
      });
  });
  </script>
</body>
</html>
