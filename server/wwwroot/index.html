<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ChefBook — Главная</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="common.css" />
    <script src="common.js" defer></script>
    <script src="index.js" defer></script>
  </head>
  <body>
    <div class="page">
      <div
        class="site-root"
        role="document"
        aria-label="Главная страница — ChefBook"
      >
        <!-- Шапка -->
        <header class="site__header" role="banner" aria-label="Шапка">
          <div class="site-title">
            <img src="/icons/logo.svg" alt="" aria-hidden="true" />
            <span>ChefBook</span>
          </div>
          <nav
            class="site__nav site__nav--left"
            role="navigation"
            aria-label="Основная навигация"
          >
            <button
              class="btn header-btn"
              type="button"
              data-href="/index.html"
              aria-label="Главная"
            >
              <img
                src="/icons/home.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ГЛАВНАЯ</span>
            </button>
            <button
              class="btn header-btn"
              type="button"
              data-href="/Catalog"
              aria-label="Поиск"
            >
              <img
                src="/icons/search.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ПОИСК</span>
            </button>
          </nav>
          <nav class="site__nav site__nav--right" aria-label="Аккаунт">
            <button
              class="btn header-btn nav-auth-btn"
              type="button"
              data-href="/auth.html"
              aria-label="Войти в аккаунт"
            >
              <img
                src="/icons/profile.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ВОЙТИ</span>
            </button>
          </nav>
        </header>

        <!-- Основной контент -->
        <main
          class="site__main"
          role="main"
          aria-label="Контент — список рецептов"
        >
          <div class="recipes-div" aria-labelledby="recipes-title">
            <h1 id="recipes-title" class="recipes-div__title">
              Список рецептов
            </h1>
            <ul
              class="recipes-list"
              role="list"
              aria-label="Список рецептов"
              id="recipesGrid"
            ></ul>
          </div>
        </main>

        <!-- Подвал -->
        <footer
          class="site__footer"
          role="contentinfo"
          aria-label="Нижняя навигация"
        >
          <button
            class="nav-item btn footer-home"
            type="button"
            data-href="/index.html"
          >
            <img
              src="/icons/home.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Главная</span>
          </button>
          <button
            class="nav-item btn footer-search"
            type="button"
            data-href="/Catalog"
          >
            <img
              src="/icons/search.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Поиск</span>
          </button>
          <button
            class="nav-item btn footer-auth nav-auth-btn"
            type="button"
            data-href="/auth.html"
          >
            <img
              src="/icons/profile.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Войти</span>
          </button>
          <button
            class="nav-item btn footer-about"
            type="button"
            data-href="/about.html"
          >
            <img
              src="/icons/info.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">О нас</span>
          </button>
        </footer>
      </div>
    </div>
  </body>
</html>
