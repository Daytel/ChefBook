<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ChefBook - Авторизация</title>
    <link rel="stylesheet" href="auth.css" />
    <link rel="stylesheet" href="common.css" />
    <script src="auth.js" defer></script>
  </head>
  <body>
    <div class="page">
      <div
        class="site-root"
        role="document"
        aria-label="Авторизация — прототип"
      >
        <!-- Шапка -->
        <header class="site__header" role="banner" aria-label="Шапка">
          <div class="site-title">
            <img src="/icons/logo.svg" alt="" aria-hidden="true" />
            <span>ChefBook</span>
          </div>

          <nav
            class="site__nav"
            role="navigation"
            aria-label="Главная навигация шапки"
          >
            <button
              class="home-button btn"
              aria-label="Главная страница (кнопка)"
              data-href="index.html"
              type="button"
            >
              <img
                src="/icons/home.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ГЛАВНАЯ</span>
            </button>

            <button
              class="profile-button btn"
              role="button"
              aria-label="Профиль / Регистрация"
              data-href="profile.html"
              type="button"
            >
              <img
                src="/icons/profile.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ПРОФИЛЬ / РЕГИСТРАЦИЯ</span>
            </button>
          </nav>
        </header>

        <!-- main: форма авторизации -->
        <main class="site__main" role="main" aria-label="Форма авторизации">
          <div class="auth-div" aria-labelledby="auth-title">
            <h1 id="auth-title" class="search-title">Вход в аккаунт</h1>

            <div class="content-inner auth-inner">
              <form
                id="authForm"
                class="auth-form"
                aria-label="Форма входа"
                autocomplete="on"
                action="/login"
                method="post"
              >
                <label for="login" class="label">Электронная почта</label>
                <input
                  id="login"
                  name="login"
                  class="input"
                  type="email"
                  inputmode="email"
                  autocomplete="username"
                  required
                  aria-required="true"
                  placeholder="example@domain.com"
                  pattern="^[^@\s]+@[^@\s]+\.[^@\s]+$"
                  title="Введите корректный email: обязателен символ @ и точка после него"
                />

                <label for="password" class="label">Пароль</label>
                <div class="password-row">
                  <input
                    id="password"
                    name="password"
                    class="input"
                    type="password"
                    autocomplete="current-password"
                    required
                    aria-required="true"
                    placeholder="Минимум 8 символов"
                    minlength="8"
                    pattern="(?=.*\d)(?=.*[A-Za-z]).{8,}"
                    title="Пароль должен быть минимум 8 символов и содержать буквы и цифры"
                  />
                  <button
                    type="button"
                    class="btn small toggle-pass"
                    aria-label="Показать пароль"
                  >
                    Показать
                  </button>
                </div>

                <div class="row-space">
                  <label class="checkbox">
                    <input id="remember" type="checkbox" name="remember" />
                    <span>Запомнить меня</span>
                  </label>

                  <a href="help.html" class="link">Забыли пароль?</a>
                </div>

                <div style="margin-top: 12px; display: flex; gap: 8px">
                  <button id="loginBtn" class="btn" type="submit">Войти</button>
                </div>

                <div
                  id="authMsg"
                  class="muted"
                  role="status"
                  aria-live="polite"
                  style="margin-top: 10px"
                ></div>
              </form>
            </div>
          </div>
        </main>

        <!-- Подвал -->
        <footer
          class="site__footer"
          role="contentinfo"
          aria-label="Нижняя навигация"
        >
          <button
            class="nav-item btn home"
            type="button"
            data-href="index.html"
          >
            <img
              src="/icons/home.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Главная</span>
          </button>

          <button
            class="nav-item btn profile"
            type="button"
            data-href="profile.html"
          >
            <img
              src="/icons/profile.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Профиль / Регистрация</span>
          </button>

          <button
            class="nav-item btn only-about"
            type="button"
            data-href="about.html"
            aria-label="О нас"
          >
            <img
              src="/icons/info.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">О нас</span>
          </button>
        </footer>
      </div>
    </div>
  </body>
</html>
