<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ChefBook - Добавить рецепт</title>
    <link rel="stylesheet" href="add-recipe.css" />
    <link rel="stylesheet" href="common.css" />
    <script src="add-recipe.js" defer></script>
  </head>
  <body>
    <div class="page">
      <div
        class="site-root"
        role="document"
        aria-label="Страница Добавить рецепт — ChefBook"
      >
        <!-- Шапка -->
        <header class="site__header" role="banner" aria-label="Шапка">
          <div class="site-title">
            <img src="/icons/logo.svg" alt="" aria-hidden="true" />
            <span>ChefBook</span>
          </div>

          <nav
            class="site__nav"
            role="navigation"
            aria-label="Главная навигация шапки"
          >
            <button
              class="home-button btn"
              aria-label="Главная страница (кнопка)"
              data-href="index.html"
              type="button"
            >
              <img
                src="/icons/home.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ГЛАВНАЯ</span>
            </button>

            <button
              class="search-button btn"
              aria-label="Страница поиска (кнопка)"
              data-href="search.html"
              type="button"
            >
              <img
                src="/icons/search.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ПОИСК</span>
            </button>

            <button
              class="profile-button btn"
              role="button"
              aria-label="Профиль / Регистрация"
              data-href="profile.html"
              type="button"
            >
              <img
                src="/icons/profile.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ПРОФИЛЬ / РЕГИСТРАЦИЯ</span>
            </button>
          </nav>
        </header>

        <!-- Содержание -->
        <main
          class="site__main"
          role="main"
          aria-label="Форма добавления рецепта"
        >
          <div class="add-recipe-div" aria-labelledby="add-title">
            <h1 id="add-title" class="search-title">Добавить рецепт</h1>

            <div class="content-inner add-inner">
              <!-- Форма -->
              <form id="recipeForm" class="left-column add-column" novalidate>
                <!-- Название рецепта -->
                <h2 class="panel-title">НАЗВАНИЕ РЕЦЕПТА</h2>
                <div class="field">
                  <input
                    id="title"
                    class="input"
                    name="title"
                    placeholder="Введите название рецепта"
                    maxlength="30"
                    required
                  />
                  <div class="field-error" data-for="title"></div>
                </div>

                <!-- Краткое описание -->
                <h2 class="panel-title">КРАТКОЕ ОПИСАНИЕ</h2>
                <div class="field">
                  <textarea
                    id="shortDesc"
                    class="input"
                    rows="3"
                    placeholder="Короткое описание рецепта"
                    maxlength="300"
                  ></textarea>
                  <div class="field-error" data-for="shortDesc"></div>
                </div>

                <h2 class="panel-title">ФОТО БЛЮДА</h2>
                <div class="box photo-box">
                  <label
                    for="dishPhotos"
                    class="btn"
                    >Загрузить фото</label
                  >
                  <input
                    id="dishPhotos"
                    class="visually-hidden"
                    type="file"
                    accept="image/*"
                    multiple
                  />
                  <div
                    id="photosPreview"
                    class="photos-preview"
                    aria-live="polite"
                  ></div>
                  <p>
                    Карусель: установите главное фото щелчком по миниатюре.
                  </p>
                  <div class="field-error" data-for="photos"></div>
                </div>

                <!-- Список ингредиентов -->
                <h2 class="panel-title">ИНГРЕДИЕНТЫ</h2>
                <div
                  id="ingredientsList"
                  class="box ingredients-box"
                  aria-live="polite"
                >
                  <!-- Добавление через JS -->
                </div>
                <div class="field-error" data-for="ingredients"></div>

                <div class="ingredient-add">
                  <button id="addIngredientBtn" class="btn" type="button">
                    Добавить ингредиент
                  </button>
                  <label
                    class="ingredient-label"
                    >Число порций
                    <input
                      id="servings"
                      class="servings-count"
                      type="number"
                      min="1"
                      value="1"
                      aria-label="Число порций"
                    />
                  </label>
                </div>

                <!-- Категории -->
                <h2 class="panel-title">КАТЕГОРИИ</h2>
                <div
                  id="categoriesBox"
                  class="box"
                  role="group"
                  aria-label="Категории рецепта"
                >
                  <!-- Добавление через JS -->
                </div>
                <div class="field-error" data-for="categories"></div>

                <!-- Шаги приготовления -->
                <h2 class="panel-title">
                  ШАГИ ПРИГОТОВЛЕНИЯ
                </h2>
                <div id="stepsBox" class="box steps-box" aria-live="polite">
                  <!-- Добавление через JS -->
                </div>
                
                <div class="step-add">
                  <button id="addStepBtn" class="btn" type="button">
                    Добавить шаг
                  </button>
                </div>
                <div class="field-error" data-for="steps"></div>

                <!-- Сохранение / Сброс -->
                <div class="form-actions">
                  <button id="saveRecipe" class="btn" type="button" disabled>
                    Сохранить рецепт
                  </button>
                  <button id="clearRecipe" class="btn" type="button">
                    Очистить
                  </button>
                </div>
              </form>
            </div>
          </div>
        </main>

        <!-- Подвал -->
        <footer
          class="site__footer"
          role="contentinfo"
          aria-label="Нижняя навигация"
        >
          <button
            class="nav-item btn home"
            type="button"
            data-href="index.html"
          >
            <img
              src="/icons/home.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Главная</span>
          </button>

          <button
            class="nav-item btn search"
            type="button"
            data-href="search.html"
          >
            <img
              src="/icons/search.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Поиск</span>
          </button>

          <button
            class="nav-item btn profile"
            type="button"
            data-href="profile.html"
          >
            <img
              src="/icons/profile.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Профиль / Регистрация</span>
          </button>

          <button
            class="nav-item btn only-about"
            type="button"
            data-href="about.html"
            aria-label="О нас"
          >
            <img
              src="/icons/info.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">О нас</span>
          </button>
        </footer>
      </div>
    </div>
  </body>
</html>
