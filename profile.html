<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ChefBook - Профиль</title>
    <link rel="stylesheet" href="profile.css" />
    <link rel="stylesheet" href="common.css" />
    <script src="profile.js" defer></script>
  </head>
  <body>
    <div class="page">
      <div
        class="site-root"
        role="document"
        aria-label="Профиль пользователя Александра Иванова — ChefBook"
      >
        <!-- Шапка -->
        <header class="site__header" role="banner" aria-label="Шапка">
          <div class="site-title">
            <img src="/icons/logo.svg" alt="" aria-hidden="true" />
            <span>ChefBook</span>
          </div>

          <nav
            class="site__nav"
            role="navigation"
            aria-label="Главная навигация шапки"
          >
            <button
              class="home-button btn"
              aria-label="Главная страница (кнопка)"
              data-href="index.html"
              type="button"
            >
              <img
                src="/icons/home.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ГЛАВНАЯ</span>
            </button>

            <button
              class="search-button btn"
              aria-label="Страница поиска (кнопка)"
              data-href="search.html"
              type="button"
            >
              <img
                src="/icons/search.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ПОИСК</span>
            </button>

            <button
              class="profile-button btn"
              role="button"
              aria-label="Профиль / Регистрация"
              data-href="profile.html"
              type="button"
            >
              <img
                src="/icons/profile.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ПРОФИЛЬ / РЕГИСТРАЦИЯ</span>
            </button>
          </nav>
        </header>

        <!-- main: профиль -->
        <main
          class="site__main"
          role="main"
          aria-label="Контент — профиль пользователя"
        >
          <div class="profile-div" aria-labelledby="profile-title">
            <h1 id="profile-title" class="search-title">Профиль</h1>

            <div class="content-inner profile-inner">
              <!-- Форма профиля -->
              <div
                class="left-column profile-column"
                aria-label="Форма профиля"
              >
                <form id="profileForm" class="profile-form" novalidate>
                  <div class="avatar-row">
                    <div
                      class="avatar-preview"
                      id="avatarPreview"
                      aria-hidden="false"
                    >
                      <img
                        class="avatar-img"
                        src="./images/avatar.jpg"
                        alt="Александра Иванова"
                      />
                    </div>

                    <div class="avatar-controls">
                      <label
                        for="avatarInput"
                        class="btn"
                        aria-label="Загрузить аватар"
                        >Загрузить аватар</label
                      >
                      <input
                        id="avatarInput"
                        class="visually-hidden"
                        type="file"
                        accept="image/*"
                      />

                      <button
                        id="removeAvatar"
                        class="btn"
                        type="button"
                        aria-label="Удалить аватар"
                      >
                        Удалить
                      </button>
                    </div>
                  </div>

                  <div class="field">
                    <label for="name" class="field-label">Имя</label>
                    <input
                      id="name"
                      class="input"
                      name="name"
                      placeholder="Ваше имя"
                      value="Александра Иванова"
                    />
                  </div>

                  <div class="field">
                    <label class="field-label">Роль</label>
                    <input class="input" value="Фуд-блогер" readonly />
                  </div>

                  <div class="field">
                    <label class="field-label">О себе</label>
                    <textarea class="input" rows="3">
Любит простые и быстрые рецепты для будних дней. Делится лайфхаками по хранению продуктов.</textarea
                    >
                  </div>

                  <nav
                    class="internal-nav"
                    role="navigation"
                    aria-label="Внутренняя навигация профиля"
                    style="
                      display: flex;
                      gap: 8px;
                      flex-wrap: wrap;
                      margin-top: 12px;
                    "
                  >
                    <button
                      class="btn nav-reviews reviews"
                      type="button"
                      aria-label="Отзывы"
                    >
                      Отзывы
                    </button>
                    <button
                      class="btn nav-saved saved"
                      type="button"
                      aria-label="Сохранённые рецепты"
                    >
                      Сохранённые рецепты
                    </button>
                    <button
                      class="btn nav-planner planner"
                      type="button"
                      aria-label="Планировщик меню"
                    >
                      Планировщик
                    </button>
                    <button
                      class="btn nav-add add-recipe"
                      type="button"
                      aria-label="Добавить рецепт"
                    >
                      Добавить рецепт
                    </button>
                  </nav>

                  <!-- Блок: созданные пользователем рецепты -->
                  <div class="panel-title" style="margin-top: 12px">
                    МОИ РЕЦЕПТЫ
                  </div>
                  <div
                    id="recipesList"
                    class="box recipes-list"
                    aria-live="polite"
                  >
                    <!-- Рецепты добавляются через JS -->
                  </div>

                  <!-- Любимые ингредиенты -->
                  <div class="field">
                    <label class="field-label" for="favDropdown"
                      >Любимые продукты</label
                    >
                    <div class="dropdown-container" id="favDropdown">
                      <div class="dropdown-header" tabindex="0">
                        <span class="dropdown-placeholder"
                          >Выбрать ингредиенты...</span
                        >
                        <span class="dropdown-arrow">▼</span>
                      </div>
                      <div class="dropdown-list hidden">
                        <input
                          type="text"
                          class="dropdown-search"
                          placeholder="Поиск ингредиента..."
                        />
                        <div class="dropdown-options" id="favOptions">
                          <!-- Опции с чекбоксами добавляются через JS -->
                        </div>
                      </div>
                    </div>
                  </div>

                  <!-- Нелюбимые ингредиенты -->
                  <div class="field">
                    <label class="field-label" for="disDropdown"
                      >Нелюбимые продукты</label
                    >
                    <div class="dropdown-container" id="disDropdown">
                      <div class="dropdown-header" tabindex="0">
                        <span class="dropdown-placeholder"
                          >Выбрать ингредиенты...</span
                        >
                        <span class="dropdown-arrow">▼</span>
                      </div>
                      <div class="dropdown-list hidden">
                        <input
                          type="text"
                          class="dropdown-search"
                          placeholder="Поиск ингредиента..."
                        />
                        <div class="dropdown-options" id="disOptions">
                          <!-- Опции с чекбоксами добавляются через JS -->
                        </div>
                      </div>
                    </div>
                  </div>

                  <!-- Уведомления по отслеживаемым авторам -->
                  <div
                    class="panel-title"
                    style="text-align: left; margin-top: 10px"
                  >
                    Оповещения от авторов
                  </div>
                  <div
                    id="authorsList"
                    class="box small-list"
                    aria-label="Отслеживаемые авторы"
                  >
                    <!-- Добавление через JS -->
                  </div>

                  <!-- Уведомления планировщика меню -->
                  <div class="field">
                    <label class="field-label"
                      >Оповещения планировщика меню</label
                    >
                    <div class="row" style="gap: 8px; align-items: center">
                      <label class="switch">
                        <input type="checkbox" id="plannerEnabled" />
                        <span class="slider"></span>
                      </label>
                      <select
                        id="plannerFreq"
                        aria-label="Частота оповещений планировщика"
                      >
                        <option value="daily">Ежедневно</option>
                        <option value="weekly">Еженедельно</option>
                        <option value="none">Только при корзине</option>
                      </select>
                    </div>
                  </div>

                  <div class="form-actions" style="margin-top: 12px">
                    <button id="saveBtn" class="btn" type="button">
                      Сохранить профиль
                    </button>
                    <button id="clearBtn" class="btn" type="button">
                      Сбросить
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </main>

        <!-- Модальное подтверждение удаления -->
        <div
          id="confirmModal"
          class="modal hidden"
          role="dialog"
          aria-modal="true"
          aria-labelledby="confirmTitle"
        >
          <div class="modal-backdrop" id="modalBackdrop"></div>
          <div class="modal-content" role="document">
            <h2 id="confirmTitle">Удалить рецепт?</h2>
            <p id="confirmText">
              Вы уверены, что хотите удалить этот рецепт? Действие нельзя будет
              отменить.
            </p>
            <div
              style="
                display: flex;
                gap: 8px;
                justify-content: flex-end;
                margin-top: 12px;
              "
            >
              <button id="confirmNo" class="btn" type="button">Нет</button>
              <button id="confirmYes" class="btn" type="button">Да</button>
            </div>
          </div>
        </div>

        <!-- Подвал -->
        <footer
          class="site__footer"
          role="contentinfo"
          aria-label="Нижняя навигация"
        >
          <button
            class="nav-item btn home"
            type="button"
            data-href="index.html"
          >
            <img
              src="/icons/home.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Главная</span>
          </button>

          <button
            class="nav-item btn search"
            type="button"
            data-href="search.html"
          >
            <img
              src="/icons/search.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Поиск</span>
          </button>

          <button
            class="nav-item btn profile"
            type="button"
            data-href="profile.html"
          >
            <img
              src="/icons/profile.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Профиль / Регистрация</span>
          </button>

          <button
            class="nav-item btn only-about"
            type="button"
            data-href="about.html"
            aria-label="О нас"
          >
            <img
              src="/icons/info.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">О нас</span>
          </button>
        </footer>
      </div>
    </div>
  </body>
</html>
