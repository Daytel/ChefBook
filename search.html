<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ChefBook - Поиск рецептов</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="search.css" />
    <link rel="stylesheet" href="common.css" />
    <script src="search.js" defer></script>
  </head>
  <body>
    <div class="page">
      <div
        class="site-root"
        role="document"
        aria-label="Страница Поиск рецептов — ChefBook"
      >
        <!-- Шапка -->
        <header class="site__header" role="banner" aria-label="Шапка">
          <div class="site-title">
            <img src="/icons/logo.svg" alt="" aria-hidden="true" />
            <span>ChefBook</span>
          </div>

          <nav
            class="site__nav"
            role="navigation"
            aria-label="Главная навигация шапки"
          >
            <button
              class="home-button btn"
              aria-label="Главная страница (кнопка)"
              data-href="index.html"
              type="button"
            >
              <img
                src="/icons/home.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ГЛАВНАЯ</span>
            </button>

            <button
              class="profile btn"
              role="button"
              aria-label="Профиль / Регистрация"
              data-href="profile.html"
              type="button"
            >
              <img
                src="/icons/profile.svg"
                class="btn-icon"
                alt=""
                aria-hidden="true"
              />
              <span class="btn-label">ПРОФИЛЬ / РЕГИСТРАЦИЯ</span>
            </button>
          </nav>
        </header>

        <main
          class="site__main"
          role="main"
          aria-label="Контент — поиск рецептов"
        >
          <div class="search-div" aria-labelledby="search-title">
            <h1 id="search-title" class="search-title">Поиск</h1>

            <div class="content-inner">
              <!-- Форма с фильтрами и категориями -->
              <div class="left-column" aria-label="Фильтры и категории">
                <form
                  class="search-area"
                  role="search"
                  aria-label="Форма поиска"
                >
                  <section>
                    <h2 id="filters-title" class="panel-title">ФИЛЬТРЫ</h2>
                    <div class="search-row">
                      <label for="question" class="visually-hidden"
                        >Поиск по названию или ингредиенту</label
                      >
                      <input
                        id="question"
                        class="input"
                        name="question"
                        placeholder="Введите название или ингредиент"
                        autocomplete="off"
                      />
                      <button
                        id="searchBtn"
                        class="search-button btn"
                        type="submit"
                        aria-label="Начать поиск"
                      >
                        Начать поиск
                      </button>
                    </div>

                    <div class="filters" aria-hidden="false">
                      <div class="filter">
                        <label for="f-ing">Ингредиенты</label>
                        <select id="f-ing" name="ingredient">
                          <option value="">Любые</option>
                          <option value="Курица">Курица</option>
                          <option value="Овощи">Овощи</option>
                          <option value="Рыба">Рыба</option>
                          <option value="Овсянка">Овсянка</option>
                        </select>
                      </div>
                      <div class="filter">
                        <label for="f-time">Время приготовления</label>
                        <select id="f-time" name="time">
                          <option value="">Любое</option>
                          <option value="15">до 15 мин</option>
                          <option value="30">до 30 мин</option>
                        </select>
                      </div>
                      <div class="filter">
                        <label for="f-cal">Калории</label>
                        <select id="f-cal" name="cal">
                          <option value="">Любые</option>
                          <option value="100">&lt;100</option>
                          <option value="200">&lt;200</option>
                        </select>
                      </div>
                    </div>
                  </section>

                  <section class="categories-section">
                    <h2 id="categories-title" class="panel-title">КАТЕГОРИИ</h2>
                    <fieldset
                      class="categories"
                      aria-labelledby="categories-title"
                    >
                      <div class="cols">
                        <div class="category-box">
                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Завтраки"
                            />
                            <span>Завтраки</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Супы"
                            />
                            <span>Супы</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Салаты"
                            />
                            <span>Салаты</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Выпечка"
                            />
                            <span>Выпечка</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Десерты"
                            />
                            <span>Десерты</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Вегетарианские"
                            />
                            <span>Вегетарианские</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Мясные"
                            />
                            <span>Мясные</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Напитки"
                            />
                            <span>Напитки</span>
                          </label>
                        </div>

                        <div class="category-box">
                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Паста"
                            />
                            <span>Паста</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Рыба"
                            />
                            <span>Рыба</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Постные"
                            />
                            <span>Постные</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Быстро"
                            />
                            <span>Быстро</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Детское"
                            />
                            <span>Детское</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="На мангале"
                            />
                            <span>На мангале</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Сезонные"
                            />
                            <span>Сезонные</span>
                          </label>

                          <label class="category-item">
                            <input
                              class="category-checkbox"
                              type="checkbox"
                              name="categories[]"
                              value="Праздничные"
                            />
                            <span>Праздничные</span>
                          </label>
                        </div>
                      </div>
                    </fieldset>
                  </section>
                </form>
              </div>

              <!-- правая колонка: результат -->
              <div class="right-column">
                <section class="results" aria-label="Найденные рецепты">
                  <h2 class="panel-title">НАЙДЕННЫЕ РЕЦЕПТЫ</h2>
                  <ul id="resultsGrid" class="recipes-list" role="list"></ul>
                </section>

                <section class="history" aria-label="История поиска">
                  <h2 class="panel-title">ИСТОРИЯ ПОИСКА</h2>
                  <div id="historyBox" class="box">
                    <div id="historyList">Пусто</div>
                  </div>
                </section>
              </div>
            </div>
          </div>
        </main>

        <footer
          class="site__footer"
          role="contentinfo"
          aria-label="Нижняя навигация"
        >
          <button
            class="nav-item btn home"
            type="button"
            data-href="index.html"
          >
            <img
              src="/icons/home.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Главная</span>
          </button>

          <button
            class="nav-item btn profile"
            type="button"
            data-href="profile.html"
          >
            <img
              src="/icons/profile.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">Профиль / Регистрация</span>
          </button>

          <button
            class="nav-item btn only-about"
            type="button"
            data-href="about.html"
            aria-label="О нас"
          >
            <img
              src="/icons/info.svg"
              class="btn-icon"
              alt=""
              aria-hidden="true"
            />
            <span class="btn-label">О нас</span>
          </button>
        </footer>
      </div>
    </div>
  </body>
</html>
